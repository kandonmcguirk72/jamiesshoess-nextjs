<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080A09;font-family:'Rajdhani',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .card{display:grid;grid-template-columns:220px 1fr;gap:0;width:100%;max-width:680px;border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden}
  .logo-pane{background:#0E1010;display:flex;align-items:center;justify-content:center;padding:28px}
  .logo-pane img{width:160px;height:160px;object-fit:contain;display:block;mix-blend-mode:screen}
  .info-pane{padding:24px 28px;display:flex;flex-direction:column;justify-content:space-between;gap:20px;border-left:1px solid rgba(255,255,255,.06)}
  .brand-name{font-family:'Barlow Condensed',Arial Narrow,sans-serif;font-style:italic;font-weight:900;font-size:32px;color:#00ECF1;text-transform:uppercase;letter-spacing:.01em;line-height:.95}
  .brand-sub{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.35);margin-top:6px}
  .palette{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .swatch{border-radius:4px;overflow:hidden}
  .swatch-color{height:36px;width:100%}
  .swatch-label{padding:5px 4px 0;text-align:center}
  .swatch-name{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);display:block;line-height:1.3}
  .swatch-hex{font-weight:600;font-size:9px;color:rgba(255,255,255,.25);display:block;letter-spacing:.04em;margin-top:1px}
  .divider{width:32px;height:2px;background:#00ECF1;border-radius:1px}
  .tagline{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.22)}
</style>
</head>
<body>
<div class="card">
  <div class="logo-pane">
    <img src="../assets/logo-circle-badge-transparent.png" alt="JAMIESSHOESS — Shop Vintage &amp; Sneakers">
  </div>
  <div class="info-pane">
    <div>
      <div class="brand-name">Jamies<br>Shoess</div>
      <div class="brand-sub">Shop Vintage &amp; Sneakers · Springfield, MO</div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="palette">
        <div class="swatch">
          <div class="swatch-color" style="background:#FFFFFF;border:1px solid rgba(255,255,255,.12)"></div>
          <div class="swatch-label"><span class="swatch-name">Sole</span><span class="swatch-hex">#FFFFFF</span></div>
        </div>
        <div class="swatch">
          <div class="swatch-color" style="background:#00ECF1"></div>
          <div class="swatch-label"><span class="swatch-name">Minted</span><span class="swatch-hex">#00ECF1</span></div>
        </div>
        <div class="swatch">
          <div class="swatch-color" style="background:#F322B3"></div>
          <div class="swatch-label"><span class="swatch-name">Flash</span><span class="swatch-hex">#F322B3</span></div>
        </div>
        <div class="swatch">
          <div class="swatch-color" style="background:#080A09;border:1px solid rgba(255,255,255,.1)"></div>
          <div class="swatch-label"><span class="swatch-name">Leather</span><span class="swatch-hex">#080A09</span></div>
        </div>
      </div>
    </div>
    <div class="tagline">302 Park Central East · Wed–Thu 12–6 · Fri–Sat 12–7</div>
  </div>
</div>
</body>
</html>
