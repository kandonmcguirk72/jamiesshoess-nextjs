<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sole:#FFFFFF;--minted:#00ECF1;--cash:#5AE131;--flash:#F322B3;--leather:#080A09;
  --sale:#FF2D2D;
  --fd:'Barlow Condensed',Arial Narrow,sans-serif;
  --fu:'Rajdhani',system-ui,sans-serif;
  --fs:'Pacifico',cursive;
  --gm:0 0 18px rgba(0,236,241,.6),0 0 40px rgba(0,236,241,.25);
  --gf:0 0 18px rgba(243,34,179,.6),0 0 40px rgba(243,34,179,.25);
  --gc:0 0 18px rgba(90,225,49,.6),0 0 40px rgba(90,225,49,.25);
}
body{background:var(--leather);color:#fff;font-family:var(--fu);padding:22px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.cap{font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-bottom:10px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em}
</style></head><body>
<div class="col">
  <div class="cap">Official Brand Palette</div>
  <div class="row" style="gap:0;border:2px solid rgba(255,255,255,.15);border-radius:6px;overflow:hidden">
    
    <div style="flex:1;min-height:110px;background:#FFFFFF;display:flex;flex-direction:column;justify-content:space-between;padding:10px 8px">
      <span class="tag" style="color:#080A09">SOLE</span>
      <span class="tag" style="color:#080A09;opacity:.75">#FFFFFF</span>
    </div>
    <div style="flex:1;min-height:110px;background:#00ECF1;display:flex;flex-direction:column;justify-content:space-between;padding:10px 8px">
      <span class="tag" style="color:#080A09">MINTED</span>
      <span class="tag" style="color:#080A09;opacity:.75">#00ECF1</span>
    </div>
    <div style="flex:1;min-height:110px;background:#F322B3;display:flex;flex-direction:column;justify-content:space-between;padding:10px 8px">
      <span class="tag" style="color:#fff">FLASH</span>
      <span class="tag" style="color:#fff;opacity:.75">#F322B3</span>
    </div>
    <div style="flex:1;min-height:110px;background:#080A09;display:flex;flex-direction:column;justify-content:space-between;padding:10px 8px">
      <span class="tag" style="color:#fff">LEATHER</span>
      <span class="tag" style="color:#fff;opacity:.75">#080A09</span>
    </div>
  </div>
</div>
</body></html>
