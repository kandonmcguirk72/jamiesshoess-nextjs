<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sole:#FFFFFF;--minted:#00ECF1;--cash:#5AE131;--flash:#F322B3;--leather:#080A09;
  --sale:#FF2D2D;
  --fd:'Barlow Condensed',Arial Narrow,sans-serif;
  --fu:'Rajdhani',system-ui,sans-serif;
  --fs:'Pacifico',cursive;
  --gm:0 0 18px rgba(0,236,241,.6),0 0 40px rgba(0,236,241,.25);
  --gf:0 0 18px rgba(243,34,179,.6),0 0 40px rgba(243,34,179,.25);
  --gc:0 0 18px rgba(90,225,49,.6),0 0 40px rgba(90,225,49,.25);
}
body{background:var(--leather);color:#fff;font-family:var(--fu);padding:22px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.cap{font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-bottom:10px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em}
</style></head><body>
<div class="col">
  <div class="cap">Spacing — 4px base grid</div>
  
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-1</span>
    <div style="height:12px;width:4px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">4px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-2</span>
    <div style="height:12px;width:8px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">8px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-3</span>
    <div style="height:12px;width:12px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">12px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-4</span>
    <div style="height:12px;width:16px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">16px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-5</span>
    <div style="height:12px;width:24px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">24px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-6</span>
    <div style="height:12px;width:32px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">32px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-7</span>
    <div style="height:12px;width:48px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">48px</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="tag" style="width:34px;opacity:.5">s-8</span>
    <div style="height:12px;width:64px;background:var(--minted);border-radius:2px;box-shadow:0 0 6px rgba(0,236,241,.4)"></div>
    <span class="tag" style="opacity:.4;font-size:9px">64px</span>
  </div>
</div>
</body></html>
