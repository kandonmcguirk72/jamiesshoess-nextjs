<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sole:#FFFFFF;--minted:#00ECF1;--cash:#5AE131;--flash:#F322B3;--leather:#080A09;
  --sale:#FF2D2D;
  --fd:'Barlow Condensed',Arial Narrow,sans-serif;
  --fu:'Rajdhani',system-ui,sans-serif;
  --fs:'Pacifico',cursive;
  --gm:0 0 18px rgba(0,236,241,.6),0 0 40px rgba(0,236,241,.25);
  --gf:0 0 18px rgba(243,34,179,.6),0 0 40px rgba(243,34,179,.25);
  --gc:0 0 18px rgba(90,225,49,.6),0 0 40px rgba(90,225,49,.25);
}
body{background:var(--leather);color:#fff;font-family:var(--fu);padding:22px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.cap{font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-bottom:10px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em}
</style></head><body>
<div class="col">
  <div class="cap">Elevation — neon glow (dark) · sticker offset (light)</div>
  <div class="row" style="gap:20px;padding:8px 4px 16px">
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:110px;height:62px;background:rgba(255,255,255,.04);border:2px solid var(--minted);border-radius:6px;box-shadow:var(--gm)"></div>
      <span class="tag" style="font-size:9px;opacity:.4">minted glow</span>
    </div>
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:110px;height:62px;background:rgba(255,255,255,.04);border:2px solid var(--flash);border-radius:6px;box-shadow:var(--gf)"></div>
      <span class="tag" style="font-size:9px;opacity:.4">flash glow</span>
    </div>
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:110px;height:62px;background:#fff;border-radius:6px;box-shadow:4px 4px 0 #080A09"></div>
      <span class="tag" style="font-size:9px;opacity:.4">sticker offset</span>
    </div>
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:110px;height:62px;background:#fff;border-radius:6px;box-shadow:0 12px 32px -8px rgba(0,0,0,.8)"></div>
      <span class="tag" style="font-size:9px;opacity:.4">card float</span>
    </div>
  </div>
</div>
</body></html>
