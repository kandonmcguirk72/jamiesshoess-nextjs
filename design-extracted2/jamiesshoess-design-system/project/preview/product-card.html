<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box}
body{margin:0;padding:22px;background:var(--js-paper);color:var(--js-ink)}
.cap{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--js-n-600);margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

</style></head><body class="js-scope">
<div class="cap">Product card — ink outline, sticker shadow, mono price</div>
<div class="row" style="gap:16px;align-items:flex-start">
  
  <div style="flex:1;background:var(--js-white);border:3px solid var(--js-ink);border-radius:5px;box-shadow:4px 4px 0 var(--js-ink);overflow:hidden;min-width:0">
    <div style="background:#E8E2D4;height:130px;display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--js-ink);position:relative">
      <span style="font-family:var(--font-display);font-size:28px;text-transform:uppercase;opacity:.18">VTG</span>
      <span style="position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:var(--js-lime);border:2px solid var(--js-ink);padding:2px 7px;border-radius:2px;box-shadow:2px 2px 0 var(--js-ink)">VTG</span>
    </div>
    <div style="padding:10px">
      <div style="font-family:var(--font-text);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3;margin-bottom:6px">VTG 1998 JERRY RICE 9ERS TEE</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="js-price" style="font-size:18px">$60.00</span>
        <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--js-n-500)">SIZE M</span>
      </div>
    </div>
  </div>
  <div style="flex:1;background:var(--js-white);border:3px solid var(--js-ink);border-radius:5px;box-shadow:4px 4px 0 var(--js-ink);overflow:hidden;min-width:0">
    <div style="background:#D0E8FF;height:130px;display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--js-ink);position:relative">
      <span style="font-family:var(--font-display);font-size:28px;text-transform:uppercase;opacity:.18">JAMIESSHOESS</span>
      <span style="position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:var(--js-lime);border:2px solid var(--js-ink);padding:2px 7px;border-radius:2px;box-shadow:2px 2px 0 var(--js-ink)">1/1</span>
    </div>
    <div style="padding:10px">
      <div style="font-family:var(--font-text);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3;margin-bottom:6px">JAMIESSHOESS OG TEE</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="js-price" style="font-size:18px">$30.00</span>
        <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--js-n-500)">SIZE S–3XL</span>
      </div>
    </div>
  </div>
  <div style="flex:1;background:var(--js-white);border:3px solid var(--js-ink);border-radius:5px;box-shadow:4px 4px 0 var(--js-ink);overflow:hidden;min-width:0">
    <div style="background:#E8D4C4;height:130px;display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--js-ink);position:relative">
      <span style="font-family:var(--font-display);font-size:28px;text-transform:uppercase;opacity:.18">VTG</span>
      <span style="position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:var(--js-lime);border:2px solid var(--js-ink);padding:2px 7px;border-radius:2px;box-shadow:2px 2px 0 var(--js-ink)">VTG</span>
    </div>
    <div style="padding:10px">
      <div style="font-family:var(--font-text);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3;margin-bottom:6px">VTG NASCAR AOP</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="js-price" style="font-size:18px">$100.00</span>
        <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--js-n-500)">SIZE L</span>
      </div>
    </div>
  </div>
</div></body></html>
