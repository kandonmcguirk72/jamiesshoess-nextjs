<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080A09;font-family:'Rajdhani',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding:24px}
  .cap{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.3);margin-bottom:14px}
  .row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .pill{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.13em;padding:5px 12px;border-radius:999px;border:1px solid;white-space:nowrap}
  .solid{font-family:'Barlow Condensed',Arial Narrow,sans-serif;font-style:italic;font-weight:900;font-size:12px;text-transform:uppercase;padding:3px 10px;border-radius:3px;letter-spacing:.02em}
  .divider{height:1px;background:rgba(255,255,255,.07);margin:4px 0 14px}
</style>
</head>
<body>

<div class="cap">Product Tags — Pill style</div>
<div class="row">
  <span class="pill" style="color:#00ECF1;border-color:rgba(0,236,241,.3);background:rgba(0,236,241,.07)">VTG</span>
  <span class="pill" style="color:#F322B3;border-color:rgba(243,34,179,.3);background:rgba(243,34,179,.07)">Y2K</span>
  <span class="pill" style="color:#00ECF1;border-color:rgba(0,236,241,.3);background:rgba(0,236,241,.07)">1/1</span>
  <span class="pill" style="color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04)">SINGLE STITCH</span>
  <span class="pill" style="color:#F322B3;border-color:rgba(243,34,179,.3);background:rgba(243,34,179,.07)">COLLAB</span>
  <span class="pill" style="color:#F322B3;border-color:rgba(243,34,179,.3);background:rgba(243,34,179,.07)">SALE</span>
  <span class="pill" style="color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.03)">SOLD OUT</span>
  <span class="pill" style="color:#00ECF1;border-color:rgba(0,236,241,.3);background:rgba(0,236,241,.07)">NEW DROP</span>
  <span class="pill" style="color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.03)">SGF · MO</span>
  <span class="pill" style="color:#00ECF1;border-color:rgba(0,236,241,.25);background:rgba(0,236,241,.06)">SIZE S–3XL</span>
</div>

<div class="divider"></div>

<div class="cap">Solid Badge style — on card / image corners</div>
<div class="row">
  <span class="solid" style="background:#00ECF1;color:#080A09">VTG</span>
  <span class="solid" style="background:#F322B3;color:#fff">COLLAB</span>
  <span class="solid" style="background:#00ECF1;color:#080A09">1/1</span>
  <span class="solid" style="background:#F322B3;color:#fff">SALE</span>
  <span class="solid" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.35)">SOLD OUT</span>
  <span class="solid" style="background:#F322B3;color:#fff">NEW DROP</span>
</div>

<div class="divider"></div>

<div class="cap">Announcement Bar — Flash background</div>
<div class="row">
  <div style="background:#F322B3;color:#fff;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.18em;padding:6px 16px;border-radius:3px;width:100%">
    NEW DROP EVERY WEEKEND — FOLLOW @JAMIESSHOESS FOR UPDATES
  </div>
</div>

</body>
</html>
