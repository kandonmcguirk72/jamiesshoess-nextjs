<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sole:#FFFFFF;--minted:#00ECF1;--cash:#5AE131;--flash:#F322B3;--leather:#080A09;
  --sale:#FF2D2D;
  --fd:'Barlow Condensed',Arial Narrow,sans-serif;
  --fu:'Rajdhani',system-ui,sans-serif;
  --fs:'Pacifico',cursive;
  --gm:0 0 18px rgba(0,236,241,.6),0 0 40px rgba(0,236,241,.25);
  --gf:0 0 18px rgba(243,34,179,.6),0 0 40px rgba(243,34,179,.25);
  --gc:0 0 18px rgba(90,225,49,.6),0 0 40px rgba(90,225,49,.25);
}
body{background:var(--leather);color:#fff;font-family:var(--fu);padding:22px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.cap{font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-bottom:10px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em}
</style></head><body>
<div class="col" style="gap:14px">
  <div class="cap">Buttons</div>
  <div class="row" style="align-items:center;gap:12px;flex-wrap:wrap">
    <button style="font-family:var(--fd);font-style:italic;font-weight:900;font-size:18px;text-transform:uppercase;background:var(--minted);color:#080A09;border:none;border-radius:4px;padding:12px 32px;cursor:pointer;letter-spacing:.02em;box-shadow:0 0 20px rgba(0,236,241,.45)">SHOP NOW</button>
    <button style="font-family:var(--fd);font-style:italic;font-weight:900;font-size:18px;text-transform:uppercase;background:var(--flash);color:#fff;border:none;border-radius:4px;padding:12px 32px;cursor:pointer;letter-spacing:.02em;box-shadow:0 0 20px rgba(243,34,179,.45)">NEW DROP</button>
    <button style="font-family:var(--fd);font-style:italic;font-weight:900;font-size:18px;text-transform:uppercase;background:transparent;color:var(--minted);border:2px solid var(--minted);border-radius:4px;padding:11px 32px;cursor:pointer;letter-spacing:.02em">COME SHOP</button>
    <button style="font-family:var(--fd);font-style:italic;font-weight:900;font-size:18px;text-transform:uppercase;background:rgba(255,255,255,.06);color:#fff;border:2px solid rgba(255,255,255,.18);border-radius:4px;padding:11px 32px;cursor:pointer;letter-spacing:.02em">VIEW ALL</button>
  </div>
  <div class="row" style="gap:10px;flex-wrap:wrap">
    <button style="font-family:var(--fu);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.16em;background:transparent;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:7px 16px;cursor:pointer">SOLD OUT</button>
    <button style="font-family:var(--fu);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.16em;background:rgba(243,34,179,.15);color:var(--flash);border:1px solid rgba(243,34,179,.4);border-radius:4px;padding:7px 16px;cursor:pointer">SALE</button>
    <button style="font-family:var(--fu);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.16em;background:rgba(0,236,241,.1);color:var(--minted);border:1px solid rgba(0,236,241,.35);border-radius:4px;padding:7px 16px;cursor:pointer">LOCAL PICKUP</button>
    <button style="font-family:var(--fu);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.16em;background:rgba(243,34,179,.1);color:var(--flash);border:1px solid rgba(243,34,179,.35);border-radius:4px;padding:7px 16px;cursor:pointer">NEW ARRIVAL</button>
  </div>
</div>
</body></html>
