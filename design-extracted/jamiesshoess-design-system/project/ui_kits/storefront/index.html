<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JAMIESSHOESS — Shop Vintage &amp; Sneakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #080A09; color: #fff; font-family: 'Rajdhani', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  #root { min-height: 100vh; }

  /* Section: product area is dark */
  .product-section { background: #080A09; border-top: 1px solid rgba(255,255,255,.07); }

  /* Filter tabs */
  .filter-tab { background: none; border: 1px solid rgba(8,10,9,.15); border-radius: 4px; padding: 8px 20px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .14em; cursor: pointer; transition: all .15s; color: #555; }
  .filter-tab.active { background: #080A09; border-color: #080A09; color: #00ECF1; }
  .filter-tab:hover:not(.active) { border-color: #080A09; color: #080A09; }

  /* Product grid */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .product-grid-section { background: #080A09; }

  /* Hero */
  .hero-section { background: #080A09; padding: clamp(60px, 10vw, 110px) clamp(16px, 5vw, 80px); display: flex; align-items: center; gap: 60px; }

  /* Features bar */
  .features-bar { background: #0E1010; border-top: 1px solid rgba(255,255,255,.07); border-bottom: 1px solid rgba(255,255,255,.07); }

  @keyframes jms-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="ProductCard.jsx"></script>
<script type="text/babel" src="CartDrawer.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const { useState, useMemo } = React;

const FILTERS = ['Shop','Sneakers','Vintage','Merch','Collab'];

const FEATURES = [
  { icon:'◈', label:'In-Store Trades', desc:'Bring in your items — we trade' },
  { icon:'◉', label:'Selective Buying', desc:'We buy quality pieces' },
  { icon:'◎', label:'Local Pickup', desc:'Free pickup at the store' },
  { icon:'◆', label:'Wide Selection', desc:'Vintage, sneakers, merch & more' },
];

function HeroSection({ onShopClick }) {
  return (
    <section data-screen-label="Hero" style={{ background:'#080A09', width:'100%', overflow:'hidden', padding:'clamp(48px,8vw,90px) 0', display:'flex', justifyContent:'center' }}>
      <div style={{ maxWidth:720, width:'100%', padding:'0 clamp(16px,4vw,40px)', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center', gap:28 }}>
        <div style={{ width:200, height:200, borderRadius:'50%', border:'2px solid rgba(0,236,241,.55)', boxShadow:'0 0 28px rgba(0,236,241,.45), 0 0 64px rgba(0,236,241,.2), 0 0 110px rgba(0,236,241,.1)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <img src="../../assets/logo-circle-badge-main.png" alt="JAMIESSHOESS" style={{ width:'100%', height:'100%', objectFit:'contain', mixBlendMode:'screen', display:'block' }}/>
        </div>
        <div style={{ width:'100%' }}>
          <div style={{ fontWeight:700, fontSize:11, textTransform:'uppercase', letterSpacing:'.2em', color:'rgba(255,255,255,.35)', marginBottom:12 }}>Springfield, MO · The 417</div>
          <h1 style={{ fontFamily:"'Barlow Condensed',Arial Narrow,sans-serif", fontStyle:'italic', fontWeight:900, fontSize:60, lineHeight:.9, textTransform:'uppercase', color:'#fff', margin:0, textAlign:'center' }}>
            Shop <span style={{ color:'#00ECF1' }}>Vintage</span> &amp; Sneakers
          </h1>
          <p style={{ fontWeight:500, fontSize:14, color:'rgba(255,255,255,.45)', lineHeight:1.6, maxWidth:480, margin:'16px auto 0', textTransform:'uppercase', letterSpacing:'.06em' }}>
            Curated vintage clothing, rare sneakers &amp; exclusive collabs — downtown Springfield.
          </p>
        </div>
        <div style={{ display:'flex', gap:12, flexWrap:'wrap', justifyContent:'center' }}>
          <button onClick={onShopClick} style={{ fontFamily:"'Barlow Condensed',sans-serif", fontStyle:'italic', fontWeight:900, fontSize:18, textTransform:'uppercase', background:'#00ECF1', color:'#080A09', border:'none', borderRadius:4, padding:'13px 40px', cursor:'pointer', letterSpacing:'.02em', boxShadow:'0 0 24px rgba(0,236,241,.35)' }}>Shop Now</button>
          <button style={{ fontFamily:"'Barlow Condensed',sans-serif", fontStyle:'italic', fontWeight:900, fontSize:18, textTransform:'uppercase', background:'transparent', color:'#fff', border:'2px solid rgba(255,255,255,.25)', borderRadius:4, padding:'12px 40px', cursor:'pointer', letterSpacing:'.02em' }}>Learn More</button>
        </div>
      </div>
    </section>
  );
}

function FeaturesBar() {
  return (
    <div className="features-bar" data-screen-label="Features">
      <div style={{ maxWidth:1260, margin:'0 auto', padding:'0 clamp(16px,4vw,52px)', display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:0 }}>
        {FEATURES.map((f, i) => (
          <div key={i} style={{ padding:'22px 24px', borderRight: i < 3 ? '1px solid rgba(255,255,255,.07)' : 'none', display:'flex', alignItems:'flex-start', gap:14 }}>
            <span style={{ color:'#00ECF1', fontSize:18, flexShrink:0, marginTop:1 }}>{f.icon}</span>
            <div>
              <div style={{ fontWeight:700, fontSize:12, textTransform:'uppercase', letterSpacing:'.1em', color:'rgba(255,255,255,.8)', lineHeight:1.3 }}>{f.label}</div>
              <div style={{ fontWeight:500, fontSize:11, textTransform:'uppercase', letterSpacing:'.06em', color:'rgba(255,255,255,.3)', marginTop:3 }}>{f.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ProductSection({ onQuickView }) {
  const [activeFilter, setActiveFilter] = useState('shop');

  const filtered = useMemo(() => {
    if (activeFilter === 'shop') return window.PRODUCTS;
    return window.PRODUCTS.filter(p => p.cat === activeFilter);
  }, [activeFilter]);

  return (
    <section className="product-section" data-screen-label="Products" style={{ padding:'48px clamp(16px,4vw,52px)' }}>
      <div style={{ maxWidth:1260, margin:'0 auto' }}>
        {/* Section heading */}
        <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:28, flexWrap:'wrap', gap:12 }}>
          <h2 style={{ fontFamily:"'Barlow Condensed',Arial Narrow,sans-serif", fontStyle:'italic', fontWeight:900, fontSize:32, color:'#080A09', textTransform:'uppercase', letterSpacing:'.01em' }}>
            Now In-Store
          </h2>
          <span style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, textTransform:'uppercase', letterSpacing:'.14em', color:'#aaa' }}>
            {filtered.length} items
          </span>
        </div>
        {/* Filters */}
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:28 }}>
          {FILTERS.map(f => (
            <button key={f} className={`filter-tab${activeFilter === f.toLowerCase() ? ' active' : ''}`} onClick={() => setActiveFilter(f.toLowerCase())}>{f}</button>
          ))}
        </div>
        {/* Grid */}
        <div className="product-grid">
          {filtered.map(p => <ProductCard key={p.id} product={p} onQuickView={onQuickView} />)}
        </div>
        {filtered.length === 0 && (
          <div style={{ textAlign:'center', padding:'60px 0', color:'#aaa', fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'.12em' }}>
            No items in this category right now — check back soon
          </div>
        )}
      </div>
    </section>
  );
}

function TradeSection() {
  return (
    <section data-screen-label="Trade & Buy" style={{ background:'#080A09', padding:'64px clamp(16px,4vw,52px)' }}>
      <div style={{ maxWidth:1260, margin:'0 auto', display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
        {[
          { color:'#00ECF1', title:'We Trade', body:'Bring in your vintage clothing or sneakers and trade for something from the shop. We work with you to make fair deals on quality pieces.', cta:'Ask About Trades' },
          { color:'#5AE131', title:'We Buy', body:"Got something we'd love? We selectively purchase high-quality vintage clothing and sought-after sneakers. Quality over quantity — always.", cta:'Sell to Us' },
        ].map(card => (
          <div key={card.title} style={{ background:'rgba(255,255,255,.03)', border:'1px solid rgba(255,255,255,.08)', borderRadius:6, padding:'36px 32px' }}>
            <div style={{ width:32, height:3, background:card.color, borderRadius:2, marginBottom:20 }}></div>
            <div style={{ fontFamily:"'Barlow Condensed',Arial Narrow,sans-serif", fontStyle:'italic', fontWeight:900, fontSize:36, color:'#fff', textTransform:'uppercase', marginBottom:12 }}>{card.title}</div>
            <p style={{ fontWeight:500, fontSize:14, color:'rgba(255,255,255,.5)', lineHeight:1.7, maxWidth:380, textTransform:'uppercase', letterSpacing:'.04em', marginBottom:24 }}>{card.body}</p>
            <button style={{ fontFamily:"'Barlow Condensed',Arial Narrow,sans-serif", fontStyle:'italic', fontWeight:900, fontSize:16, textTransform:'uppercase', background:'transparent', color:card.color, border:`2px solid ${card.color}`, borderRadius:4, padding:'10px 26px', cursor:'pointer', letterSpacing:'.02em' }}>{card.cta}</button>
          </div>
        ))}
      </div>
    </section>
  );
}

function App() {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [qvProduct, setQvProduct] = useState(null);
  const [activeFilter, setActiveFilter] = useState('shop');

  const addToCart = (product) => setCart(c => [...c, product]);
  const removeFromCart = (i) => setCart(c => c.filter((_, idx) => idx !== i));

  const scrollToShop = () => {
    const el = document.querySelector('[data-screen-label="Products"]');
    if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
  };

  return (
    <>
      <Header
        cartCount={cart.length}
        onCartOpen={() => setCartOpen(true)}
        activeFilter={activeFilter}
        onFilterChange={f => { setActiveFilter(f); scrollToShop(); }}
      />
      <HeroSection onShopClick={scrollToShop} />
      <FeaturesBar />
      <ProductSection onQuickView={setQvProduct} />
      <TradeSection />
      <Footer />
      {qvProduct && <QuickView product={qvProduct} onClose={() => setQvProduct(null)} onAddToCart={addToCart} />}
      <CartDrawer open={cartOpen} cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
