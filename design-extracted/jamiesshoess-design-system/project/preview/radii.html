<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sole:#FFFFFF;--minted:#00ECF1;--cash:#5AE131;--flash:#F322B3;--leather:#080A09;
  --sale:#FF2D2D;
  --fd:'Barlow Condensed',Arial Narrow,sans-serif;
  --fu:'Rajdhani',system-ui,sans-serif;
  --fs:'Pacifico',cursive;
  --gm:0 0 18px rgba(0,236,241,.6),0 0 40px rgba(0,236,241,.25);
  --gf:0 0 18px rgba(243,34,179,.6),0 0 40px rgba(243,34,179,.25);
  --gc:0 0 18px rgba(90,225,49,.6),0 0 40px rgba(90,225,49,.25);
}
body{background:var(--leather);color:#fff;font-family:var(--fu);padding:22px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.cap{font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-bottom:10px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em}
</style></head><body>
<div class="col">
  <div class="cap">Border Radius — brand runs hard-to-semi-rounded</div>
  <div class="row" style="align-items:flex-end;flex-wrap:nowrap;gap:10px">
    
    <div class="col" style="flex:1;align-items:center;gap:6px">
      <div style="width:100%;height:60px;background:rgba(0,236,241,.15);border:2px solid var(--minted);border-radius:0px"></div>
      <span class="tag" style="font-size:9px;opacity:.5">0</span>
      <span class="tag" style="font-size:8px;opacity:.3">0px</span>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:6px">
      <div style="width:100%;height:60px;background:rgba(0,236,241,.15);border:2px solid var(--minted);border-radius:2px"></div>
      <span class="tag" style="font-size:9px;opacity:.5">xs</span>
      <span class="tag" style="font-size:8px;opacity:.3">2px</span>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:6px">
      <div style="width:100%;height:60px;background:rgba(0,236,241,.15);border:2px solid var(--minted);border-radius:4px"></div>
      <span class="tag" style="font-size:9px;opacity:.5">sm</span>
      <span class="tag" style="font-size:8px;opacity:.3">4px</span>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:6px">
      <div style="width:100%;height:60px;background:rgba(0,236,241,.15);border:2px solid var(--minted);border-radius:8px"></div>
      <span class="tag" style="font-size:9px;opacity:.5">md</span>
      <span class="tag" style="font-size:8px;opacity:.3">8px</span>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:6px">
      <div style="width:100%;height:60px;background:rgba(0,236,241,.15);border:2px solid var(--minted);border-radius:16px"></div>
      <span class="tag" style="font-size:9px;opacity:.5">lg</span>
      <span class="tag" style="font-size:8px;opacity:.3">16px</span>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:6px">
      <div style="width:100%;height:60px;background:rgba(0,236,241,.15);border:2px solid var(--minted);border-radius:999px"></div>
      <span class="tag" style="font-size:9px;opacity:.5">pill</span>
      <span class="tag" style="font-size:8px;opacity:.3">999px</span>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:60px;height:60px;background:rgba(243,34,179,.15);border:2px solid var(--flash);border-radius:50%"></div>
      <span class="tag" style="font-size:9px;opacity:.5">circle</span>
    </div>
  </div>
</div>
</body></html>
