<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box}
body{margin:0;padding:22px;background:var(--js-paper);color:var(--js-ink)}
.cap{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--js-n-600);margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

</style></head><body class="js-scope">
<div class="cap">Tags, chips & labels</div>
<div class="row" style="gap:10px;margin-bottom:14px">
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:var(--js-lime);border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px;box-shadow:2px 2px 0 var(--js-ink)">1/1</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:var(--js-sale);color:#fff;border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px;box-shadow:2px 2px 0 var(--js-ink)">SALE</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:var(--js-n-300);color:var(--js-n-700);border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px">SOLD OUT</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:var(--js-blue);color:#fff;border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px;box-shadow:2px 2px 0 var(--js-ink)">NEW DROP 🚨</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:var(--js-paper);border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px">VTG</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:var(--js-ink);color:#fff;border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px">Y2K</span>
</div>
<div class="row" style="gap:10px">
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;background:var(--js-paper);border:2px solid var(--js-n-400);padding:4px 10px;border-radius:3px">SIZE S</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;background:var(--js-blue);color:#fff;border:2px solid var(--js-ink);padding:4px 10px;border-radius:3px">SIZE M</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;background:var(--js-paper);border:2px solid var(--js-n-400);padding:4px 10px;border-radius:3px">SIZE L</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;background:var(--js-paper);border:2px solid var(--js-n-400);padding:4px 10px;border-radius:3px">SIZE XL</span>
  <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;background:var(--js-paper);border:2px solid var(--js-n-400);padding:4px 10px;border-radius:3px">SIZE 2XL</span>
</div></body></html>
