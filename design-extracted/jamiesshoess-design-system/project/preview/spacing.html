<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box}
body{margin:0;padding:22px;background:var(--js-paper);color:var(--js-ink)}
.row{display:flex;gap:12px}
.col{display:flex;flex-direction:column;gap:12px}
.sw{flex:1;border:3px solid var(--js-ink);border-radius:5px;min-height:92px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;overflow:hidden}
.nm{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;line-height:1.2}
.hex{font-family:var(--font-mono);font-size:11px;opacity:.72;line-height:1.4}
.cap{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--js-n-600);margin-bottom:12px}

</style></head><body class="js-scope">
<div class="cap">Spacing — 4px base</div>
<div style="display:flex;flex-direction:column;gap:8px">
  <div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-2</span><div style="height:14px;width:8px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">8px</span></div><div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-3</span><div style="height:14px;width:12px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">12px</span></div><div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-4</span><div style="height:14px;width:16px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">16px</span></div><div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-5</span><div style="height:14px;width:24px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">24px</span></div><div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-6</span><div style="height:14px;width:32px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">32px</span></div><div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-7</span><div style="height:14px;width:48px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">48px</span></div><div style="display:flex;align-items:center;gap:12px"><span class="nm" style="width:42px">s-8</span><div style="height:14px;width:64px;background:var(--js-graffiti);border:2px solid var(--js-ink)"></div><span class="hex">64px</span></div>
</div></body></html>
