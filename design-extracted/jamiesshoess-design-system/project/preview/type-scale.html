<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Rajdhani:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sole:#FFFFFF;--minted:#00ECF1;--cash:#5AE131;--flash:#F322B3;--leather:#080A09;
  --sale:#FF2D2D;
  --fd:'Barlow Condensed',Arial Narrow,sans-serif;
  --fu:'Rajdhani',system-ui,sans-serif;
  --fs:'Pacifico',cursive;
  --gm:0 0 18px rgba(0,236,241,.6),0 0 40px rgba(0,236,241,.25);
  --gf:0 0 18px rgba(243,34,179,.6),0 0 40px rgba(243,34,179,.25);
  --gc:0 0 18px rgba(90,225,49,.6),0 0 40px rgba(90,225,49,.25);
}
body{background:var(--leather);color:#fff;font-family:var(--fu);padding:22px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.cap{font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-bottom:10px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em}
</style></head><body>
<div class="col" style="gap:4px">
  <div class="cap">Type scale</div>
  
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0">
    <span style="font-family:var(--fd);font-style:italic;font-weight:900;font-size:46px;line-height:.88;text-transform:uppercase;color:var(--minted)">JAMIESSHOESS</span>
    <span class="tag" style="margin-left:auto;white-space:nowrap;opacity:.4;font-size:9px">Hero · 160 / Barlow 900i</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0">
    <span style="font-family:var(--fd);font-style:italic;font-weight:900;font-size:32px;line-height:1;text-transform:uppercase;color:#fff">JAMIESSHOESS</span>
    <span class="tag" style="margin-left:auto;white-space:nowrap;opacity:.4;font-size:9px">H1 · 96 / Barlow 900i</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0">
    <span style="font-family:var(--fd);font-style:italic;font-weight:800;font-size:24px;line-height:1.05;text-transform:uppercase;color:#fff">JAMIESSHOESS</span>
    <span class="tag" style="margin-left:auto;white-space:nowrap;opacity:.4;font-size:9px">H2 · 52 / Barlow 800i</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0">
    <span style="font-family:var(--fu);font-weight:700;font-size:18px;letter-spacing:.08em;text-transform:uppercase;color:#fff">JAMIESSHOESS</span>
    <span class="tag" style="margin-left:auto;white-space:nowrap;opacity:.4;font-size:9px">H3 · 24 / Rajdhani 700</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0">
    <span style="font-family:var(--fu);font-weight:500;font-size:14px;color:rgba(255,255,255,.7)">JAMIESSHOESS</span>
    <span class="tag" style="margin-left:auto;white-space:nowrap;opacity:.4;font-size:9px">Body · 16 / Rajdhani 500</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0">
    <span style="font-family:var(--fu);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45)">JAMIESSHOESS</span>
    <span class="tag" style="margin-left:auto;white-space:nowrap;opacity:.4;font-size:9px">Tag · 11 / Rajdhani 700</span>
  </div>
</div>
</body></html>
