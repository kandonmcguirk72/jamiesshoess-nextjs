<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box}
body{margin:0;padding:22px;background:var(--js-paper);color:var(--js-ink)}
.cap{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--js-n-600);margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

</style></head><body class="js-scope">
<div class="cap">Buttons — solid / outline / ghost + states</div>
<div class="row" style="gap:14px;margin-bottom:18px">
  <button style="font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;background:var(--js-blue);color:#fff;border:3px solid var(--js-ink);padding:13px 28px;border-radius:4px;box-shadow:4px 4px 0 var(--js-ink);cursor:pointer;outline:none">SHOP NOW</button>
  <button style="font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;background:var(--js-graffiti);color:var(--js-ink);border:3px solid var(--js-ink);padding:13px 28px;border-radius:4px;box-shadow:4px 4px 0 var(--js-ink);cursor:pointer;outline:none">ADD TO CART</button>
  <button style="font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;background:transparent;color:var(--js-ink);border:3px solid var(--js-ink);padding:13px 28px;border-radius:4px;box-shadow:4px 4px 0 var(--js-ink);cursor:pointer;outline:none">QUICK VIEW</button>
</div>
<div class="row" style="gap:14px">
  <button style="font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;background:var(--js-blue-deep);color:#fff;border:3px solid var(--js-ink);padding:13px 28px;border-radius:4px;box-shadow:2px 2px 0 var(--js-ink);cursor:pointer;outline:none;transform:translate(2px,2px)">HOVER STATE</button>
  <button style="font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;background:var(--js-n-300);color:var(--js-n-600);border:3px solid var(--js-n-400);padding:13px 28px;border-radius:4px;cursor:not-allowed;outline:none">SOLD OUT</button>
  <button style="font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;background:var(--js-sale);color:#fff;border:3px solid var(--js-ink);padding:13px 28px;border-radius:4px;box-shadow:4px 4px 0 var(--js-ink);cursor:pointer;outline:none">ON SALE</button>
</div></body></html>
