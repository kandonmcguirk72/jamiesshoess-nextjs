<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box}
body{margin:0;padding:22px;background:var(--js-paper);color:var(--js-ink)}
.cap{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--js-n-600);margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

</style></head><body class="js-scope">
<div class="cap">Form inputs — search, email signup</div>
<div style="display:flex;flex-direction:column;gap:16px">
  <div style="display:flex;gap:0;max-width:480px">
    <input placeholder="SEARCH DROPS, SIZES..." style="font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.06em;flex:1;padding:12px 16px;border:3px solid var(--js-ink);border-right:none;border-radius:4px 0 0 4px;background:var(--js-white);outline:none">
    <button style="font-family:var(--font-display);font-size:14px;text-transform:uppercase;background:var(--js-blue);color:#fff;border:3px solid var(--js-ink);padding:0 20px;border-radius:0 4px 4px 0;cursor:pointer">GO</button>
  </div>
  <div style="display:flex;gap:0;max-width:480px">
    <input placeholder="EMAIL ADDRESS" style="font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.06em;flex:1;padding:12px 16px;border:3px solid var(--js-ink);border-right:none;border-radius:4px 0 0 4px;background:var(--js-white);outline:none">
    <button style="font-family:var(--font-display);font-size:14px;text-transform:uppercase;background:var(--js-graffiti);color:var(--js-ink);border:3px solid var(--js-ink);padding:0 20px;border-radius:0 4px 4px 0;cursor:pointer">SIGN UP</button>
  </div>
  <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
    <div style="width:20px;height:20px;border:3px solid var(--js-ink);background:var(--js-blue);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
      <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em">LOCAL PICKUP (FREE)</span>
  </label>
</div></body></html>
