<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080A09;font-family:'Rajdhani',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding:22px}
</style>
</head>
<body>

<!-- Announcement bar -->
<div style="background:#F322B3;color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.16em;text-align:center;padding:6px 20px;border-radius:4px 4px 0 0">
  NEW DROP EVERY WEEKEND — FOLLOW @JAMIESSHOESS FOR UPDATES
</div>

<!-- Nav bar -->
<div style="background:#111312;border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 6px 6px;padding:0 24px;height:62px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px">

  <!-- Left: nav links -->
  <div style="display:flex;gap:22px;align-items:center">
    <span style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.55);cursor:pointer">Shop</span>
    <span style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.55);cursor:pointer">Sneakers</span>
    <span style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.55);cursor:pointer">Vintage</span>
  </div>

  <!-- Center: logo — truly centered via grid -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
    <div style="width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(0,236,241,.55);box-shadow:0 0 12px rgba(0,236,241,.35);display:flex;align-items:center;justify-content:center;background:#0D0F0E">
      <img src="../assets/logo-circle-badge-main.png" style="width:40px;height:40px;object-fit:contain;mix-blend-mode:screen;display:block">
    </div>
  </div>

  <!-- Right: nav links + icons -->
  <div style="display:flex;gap:22px;align-items:center;justify-content:flex-end">
    <span style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.55);cursor:pointer">Merch</span>
    <span style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.55);cursor:pointer">Collab</span>
    <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
  </div>

</div>

</body>
</html>
