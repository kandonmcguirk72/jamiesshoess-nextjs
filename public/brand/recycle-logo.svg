<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Recycle arrows -->
  <g stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <!-- Top right arrow -->
    <path d="M75 20 L95 35 L85 50" fill="none"/>
    <!-- Bottom right arrow -->
    <path d="M95 85 L75 100 L70 80" fill="none"/>
    <!-- Bottom left arrow -->
    <path d="M25 85 L45 70 L35 50" fill="none"/>
    <!-- Main triangle connecting the arrows -->
    <path d="M45 25 L95 25 L95 85 L45 85 L45 25" fill="none" opacity="0.3"/>
  </g>

  <!-- Central figure (stylized skater) -->
  <g fill="currentColor">
    <!-- Head -->
    <circle cx="60" cy="38" r="6"/>
    <!-- Body -->
    <rect x="57" y="48" width="6" height="16" rx="2"/>
    <!-- Left arm (skateboard grip) -->
    <path d="M57 52 L45 55" stroke="currentColor" strokeWidth="2" strokeLinecap="round" fill="none"/>
    <!-- Right arm -->
    <path d="M63 52 L75 55" stroke="currentColor" strokeWidth="2" strokeLinecap="round" fill="none"/>
    <!-- Left leg -->
    <path d="M58 64 L55 75" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
    <!-- Right leg -->
    <path d="M62 64 L65 75" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
  </g>
</svg>