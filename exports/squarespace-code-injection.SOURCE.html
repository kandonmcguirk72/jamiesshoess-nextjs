<script>
/*
  All runtime behavior in one IIFE to avoid polluting global scope.

  Functions:
    pageType()        — detects list / item / cart from body classes + URL
    darkSections()    — forces dark bg on Squarespace sections via JS setProperty
                        (CSS !important alone loses to Squarespace's own JS inline styles)
    fixHeroPadding()  — measures actual header height and adjusts hero top padding
                        MUST be called OUTSIDE the "if hero doesn't exist" guard
                        so the 700ms retry re-measures when header is fully rendered
    fixCartLinks()    — rewrites "Continue Shopping" → "Back to JAMIESSHOESS" + main site URL
    fixFooter()       — injects corrected social links row into footer
    run()             — orchestrates all of the above on DOMContentLoaded + 700ms retry

  Observers / timers:
    MutationObserver  — re-runs darkSections + fixCartLinks + fixFooter when Squarespace
                        dynamically renders new sections (e.g. cart overlay, product images)
    resize listener   — debounces fixHeroPadding (100ms) so hero padding stays correct
                        when the user rotates their device or resizes the window
*/
(function() {
  var BG = '#080A09', AC = '#00ECF1', MAIN = 'https://jamiesshoes.com';
  var LOGO = MAIN + '/brand/logos/logo-circle-badge-transparent.png';
  // NOTE: no crossorigin="anonymous" on the img — Vercel does not send
  // Access-Control-Allow-Origin headers for /brand/* static files,
  // so adding crossorigin causes the browser to silently block the image.

  // ---- HERO HTML STRING ----
  // Injected as first child of #page/.Main/main on product listing pages only.
  // Kept as a JS string so it can reference BG/AC variables.
  var HERO = '<section id="js-hero" style="background:' + BG + ';padding:clamp(80px,9vw,110px) 20px clamp(40px,5vw,60px);display:flex;justify-content:center;border-bottom:1px solid rgba(255,255,255,.07)">'
    + '<div style="max-width:560px;width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;gap:20px">'
    + '<div class="js-hero-logo" style="width:120px;height:120px;border-radius:50%;border:2px solid rgba(0,236,241,.5);box-shadow:0 0 22px rgba(0,236,241,.38),0 0 50px rgba(0,236,241,.14);background:' + BG + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
    + '<img src="' + LOGO + '" alt="JAMIESSHOESS" style="width:110px;height:110px;object-fit:contain;border-radius:50%;display:block">'
    + '</div>'
    + '<div style="font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.28)">Springfield, MO &bull; Downtown &bull; The 417</div>'
    + '<h1 style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-style:italic;font-size:clamp(34px,5.5vw,58px);line-height:.9;text-transform:uppercase;margin:0;color:#fff">'
    + '<span style="text-shadow:2px 2px 0 rgba(243,34,179,.5)">Vintage Clothing</span><br>'
    + '<span style="color:' + AC + ';text-shadow:2px 2px 0 rgba(243,34,179,.4)">&amp; Sneakers</span>'
    + '</h1>'
    + '<div class="js-hero-stats" style="width:100%;border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 0;display:flex;justify-content:center;gap:20px;flex-wrap:wrap">'
    + '<div style="text-align:center;min-width:56px"><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-style:italic;font-size:17px;color:' + AC + '">6,100+</div><div style="font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28)">Instagram</div></div>'
    + '<div style="text-align:center;min-width:56px"><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-style:italic;font-size:17px;color:' + AC + '">Weekly</div><div style="font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28)">New Drops</div></div>'
    + '<div style="text-align:center;min-width:56px"><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-style:italic;font-size:17px;color:' + AC + '">100%</div><div style="font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28)">Authentic</div></div>'
    + '</div>'
    + '<div class="js-hero-btns" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%">'
    + '<a href="/" class="js-cta-p" style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-style:italic;font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:' + BG + '!important;background:' + AC + ';padding:12px 32px;border-radius:6px;text-decoration:none;display:inline-block">Browse the Store</a>'
    + '<a href="https://instagram.com/JAMIESSHOESS" target="_blank" class="js-cta-s" style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-style:italic;font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:#fff!important;padding:11px 24px;border-radius:6px;border:1px solid rgba(255,255,255,.18);text-decoration:none;display:inline-block">@JAMIESSHOESS &#x2197;</a>'
    + '</div>'
    + '<div style="font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.18)">Wed&ndash;Thu 12&ndash;6&nbsp;&bull;&nbsp;Fri&ndash;Sat 12&ndash;7&nbsp;&bull;&nbsp;Free Local Pickup</div>'
    + '</div></section>';

  function pageType() {
    // view-item = Squarespace body class for individual product pages
    if (document.body.classList.contains('view-item') || document.querySelector('.product-details')) return 'item';
    var p = window.location.pathname.toLowerCase();
    if (p.indexOf('cart') > -1 || p.indexOf('checkout') > -1) return 'cart';
    return 'list';
  }

  function darkSections() {
    // Must use setProperty with 'important' flag — CSS !important alone loses
    // to Squarespace's own JS-applied inline background-color: white.
    document.querySelectorAll('[data-color-scheme],[data-section-id],.page-section').forEach(function(el) {
      el.style.setProperty('background-color', BG, 'important');
      el.style.setProperty('background', BG, 'important');
    });
  }

  function fixHeroPadding() {
    var hero = document.getElementById('js-hero');
    if (!hero) return;
    var hdr = document.querySelector('header,#header,.Header,.site-header');
    var hh = hdr ? (hdr.getBoundingClientRect().height || hdr.offsetHeight || 0) : 0;
    if (hh > 0) {
      var cur = parseInt(getComputedStyle(hero).paddingTop) || 80;
      if (hh + 24 > cur) hero.style.paddingTop = (hh + 24) + 'px';
    }
  }

  function fixCartLinks() {
    document.querySelectorAll('a').forEach(function(a) {
      var t = (a.textContent || '').toLowerCase().trim();
      if ((t === 'continue shopping' || t === 'keep shopping') && a.href.indexOf('jamiesshoes.com') < 0) {
        a.href = MAIN;
        a.textContent = 'Back to JAMIESSHOESS';
        a.style.cssText = 'color:' + AC + '!important;font-family:"Barlow Condensed",sans-serif;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:.04em;font-size:14px';
      }
    });
  }

  function fixFooter() {
    // Inject corrected social links, hiding Squarespace's broken auto-rendered ones.
    // YouTube was entered incorrectly in SS settings as "http://http:/YOUTUBE.COM/JAMIESSHOESS"
    var ft = document.querySelector('footer,#footer,.Footer,.sqs-footer-wrapper');
    if (!ft || ft.querySelector('#js-ft-social')) return;
    var s = document.createElement('div');
    s.id = 'js-ft-social';
    s.style.cssText = 'padding:20px 0 12px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap';
    [
      ['IG', 'https://instagram.com/JAMIESSHOESS'],
      ['TikTok', 'https://www.tiktok.com/@jamiesshoess417'],
      ['FB', 'https://www.facebook.com/p/jamiesshoess-100080011887058/'],
      ['YouTube', 'https://youtube.com/@jamiesshoess']
    ].forEach(function(l) {
      s.innerHTML += '<a href="' + l[1] + '" target="_blank" rel="noopener" style="color:rgba(255,255,255,.5)!important;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-style:italic;font-size:13px;letter-spacing:.1em;text-transform:uppercase">' + l[0] + '</a>';
    });
    ft.insertAdjacentElement('afterbegin', s);
  }

  function run() {
    var type = pageType();
    darkSections();

    // Hide Squarespace's logo image elements
    document.querySelectorAll('header img,#header img,.Header img,.site-header img').forEach(function(i) {
      i.style.setProperty('display', 'none', 'important');
    });

    // Replace logo with JAMIESSHOESS wordmark
    var ns = ['.header-title-nav-wrapper', '.Header-branding', '.site-logo', '[class*="branding"]'];
    for (var n = 0; n < ns.length; n++) {
      var el = document.querySelector(ns[n]);
      if (el && !el.querySelector('.js-wm')) {
        var img = el.querySelector('img');
        if (img) img.style.setProperty('display', 'none', 'important');
        var wm = document.createElement('a');
        // On listing page: wordmark links to the store root.
        // On item/cart pages: wordmark links back to main brand site.
        wm.href = (type === 'list') ? '/' : MAIN;
        wm.className = 'js-wm';
        wm.textContent = 'JAMIESSHOESS';
        wm.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-weight:900;font-style:italic;font-size:clamp(17px,2.5vw,22px);color:' + AC + ';text-transform:uppercase;letter-spacing:.01em;text-decoration:none;text-shadow:0 0 16px rgba(0,236,241,.5),0 0 36px rgba(0,236,241,.22);white-space:nowrap;display:block';
        el.appendChild(wm);
        break;
      }
    }

    // Inject hero on listing pages only
    if (type === 'list' && !document.getElementById('js-hero')) {
      var ts = ['#page', '#content', '.Main', '.content-wrapper', 'main'];
      for (var t = 0; t < ts.length; t++) {
        var c = document.querySelector(ts[t]);
        if (c) { c.insertAdjacentHTML('afterbegin', HERO); break; }
      }
    }

    // IMPORTANT: fixHeroPadding must be called OUTSIDE the "if hero doesn't exist"
    // block above. The 700ms setTimeout retry calls run() again when the hero
    // already exists, and that's when the header height is finally measurable.
    fixHeroPadding();

    // Inject "← All Items" breadcrumb on PDP
    if (type === 'item' && !document.getElementById('js-back')) {
      var b = document.createElement('div');
      b.id = 'js-back';
      b.style.cssText = 'background:' + BG + ';padding:10px 24px;border-bottom:1px solid rgba(255,255,255,.07)';
      b.innerHTML = '<a href="/" style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-style:italic;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none">&#8592; All Items</a>';
      var pg = document.querySelector('#page,.Main,main');
      if (pg) pg.insertAdjacentElement('afterbegin', b);
    }

    fixCartLinks();
    fixFooter();
  }

  // Debounced resize handler so hero padding stays correct on device rotation
  var _rt;
  window.addEventListener('resize', function() { clearTimeout(_rt); _rt = setTimeout(fixHeroPadding, 100); });

  // MutationObserver re-applies dark backgrounds + cart link fixes whenever
  // Squarespace dynamically renders new sections (cart overlay, product images, etc.)
  new MutationObserver(function() { darkSections(); fixCartLinks(); fixFooter(); })
    .observe(document.body, { childList: true, subtree: true, attributeFilter: ['style', 'class'] });

  // Run immediately if DOM is ready, otherwise wait for DOMContentLoaded
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
  // Second pass at 700ms — by this time Squarespace's own JS has finished
  // rendering the header, so fixHeroPadding() gets the real header height.
  setTimeout(run, 700);
})();
</script>
